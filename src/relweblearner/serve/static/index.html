<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>relweb — the creature’s console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62,500..900;125,400..800&family=Spline+Sans+Mono:ital,wght@0,300..700;1,340&display=swap" rel="stylesheet">
<style>
/* ————————————————————————————— the instrument ————————————————————————————
   A lab console for a symbolic learner. The design rule: BELIEF STATUS IS
   COLOR — committed / provisional / derived / counted / grown / defect keep
   one fixed hue everywhere (answers, edges, ledgers, chains).            */
:root{
  --bg:#0e0d10; --panel:#151318; --panel2:#1b1820; --well:#0b0a0d;
  --line:#292531; --line2:#37323f;
  --ink:#ece7db; --dim:#948d9f; --faint:#5f5969;
  --committed:#b5e04a; --provisional:#e0b34a; --derived:#4ac9e0;
  --counted:#3fe0a8; --grown:#c07ef2; --defect:#f2607e; --unknown:#6f6880;
  --mono:"Spline Sans Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sans:"Archivo",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{
  background:var(--bg) fixed;
  background-image:
    radial-gradient(1100px 500px at 70% -10%, rgba(124,94,190,.07), transparent 60%),
    radial-gradient(700px 400px at 0% 110%, rgba(74,201,224,.05), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 23px, rgba(255,255,255,.014) 23px 24px);
  color:var(--ink); font:14px/1.45 var(--mono);
  min-height:100vh; padding:14px 16px 40px;
}
::selection{background:rgba(181,224,74,.25)}
h1,h2,h3,.lbl{font-family:var(--sans)}
button,input{font:inherit;color:inherit}
a{color:var(--derived)}

/* header ————————————————————————————————————————— */
header{display:flex;flex-wrap:wrap;gap:10px 26px;align-items:flex-end;
  border-bottom:1px solid var(--line2);padding-bottom:12px;margin-bottom:14px}
.brand h1{font-variation-settings:"wdth" 125;font-weight:800;font-size:19px;
  letter-spacing:.14em;text-transform:uppercase}
.brand h1 em{color:var(--committed);font-style:normal}
.brand .who{color:var(--dim);font-size:12px;margin-top:2px}
.brand .who b{color:var(--ink)}
#vitals{display:flex;flex-wrap:wrap;gap:0;margin-left:auto}
.vital{padding:0 16px;border-left:1px solid var(--line);min-width:76px}
.vital:first-child{border-left:0}
.vital .n{font-size:19px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.vital .k{font-family:var(--sans);font-variation-settings:"wdth" 62;font-weight:600;
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
.vital.alert .n{color:var(--defect)}
.vital.ok .n{color:var(--committed)}
#legend{width:100%;display:flex;gap:14px;flex-wrap:wrap;font-size:10.5px;color:var(--dim);padding-top:6px}
#legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* layout ————————————————————————————————————————— */
main{display:grid;grid-template-columns:minmax(330px,390px) 1fr;gap:14px;align-items:start}
@media (max-width:980px){main{grid-template-columns:1fr}}
section.panel{background:var(--panel);border:1px solid var(--line);border-radius:4px;
  padding:12px 14px 14px;margin-bottom:14px;position:relative}
section.panel::before{content:"";position:absolute;inset:0 auto auto 0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--line2),transparent 70%)}
.ptitle{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.ptitle h2{font-variation-settings:"wdth" 62;font-weight:700;font-size:12px;
  letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
.ptitle .hint{font-size:10.5px;color:var(--faint);margin-left:auto;text-align:right}

/* teach ————————————————————————————————————————— */
#tmpl-row{display:flex;gap:6px;flex-wrap:wrap;max-height:74px;overflow-y:auto;margin-bottom:8px}
.tmpl{border:1px solid var(--line2);background:var(--panel2);border-radius:3px;
  font-size:11px;color:var(--dim);padding:2px 7px;cursor:pointer;white-space:nowrap}
.tmpl:hover{color:var(--ink);border-color:var(--faint)}
.tmpl .slot{color:var(--provisional)}
.inrow{display:flex;gap:8px}
input[type=text]{flex:1;background:var(--well);border:1px solid var(--line2);border-radius:3px;
  padding:7px 10px;outline:none;caret-color:var(--committed)}
input[type=text]:focus{border-color:var(--faint)}
input[type=text]::placeholder{color:var(--faint)}
button.b{background:var(--panel2);border:1px solid var(--line2);border-radius:3px;
  padding:7px 14px;cursor:pointer;font-family:var(--sans);font-variation-settings:"wdth" 62;
  font-weight:700;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
button.b:hover:not(:disabled){color:var(--ink);border-color:var(--faint)}
button.b.go{color:var(--bg);background:var(--committed);border-color:var(--committed)}
button.b.go:hover:not(:disabled){filter:brightness(1.1);color:var(--bg)}
button.b:disabled{opacity:.35;cursor:default}
#chips{display:flex;gap:6px;flex-wrap:wrap;min-height:30px;padding:8px 0 2px}
.chip{border:1px solid var(--line2);border-radius:3px;padding:3px 9px;cursor:pointer;
  background:var(--panel2);transition:border-color .1s}
.chip:hover{border-color:var(--faint)}
.chip.pic{border-color:var(--committed);color:var(--committed);box-shadow:0 0 0 1px rgba(181,224,74,.35)}
.chip.mark{border-color:var(--provisional);color:var(--provisional);border-style:dashed}
.chiphelp{font-size:10.5px;color:var(--faint);margin:2px 0 8px}
.bookrow{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--dim)}
.bookrow input{max-width:150px;padding:4px 8px}
#receipt{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px;font-size:12.5px;
  display:flex;flex-direction:column;gap:5px;max-height:170px;overflow-y:auto}
.rc{display:flex;gap:8px;align-items:baseline;animation:in .18s ease-out}
@keyframes in{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
.rc .t{color:var(--faint);font-size:10px;flex:none}
.warn{color:var(--defect)}

/* status chips (the epistemology, everywhere) ————— */
.st{display:inline-block;border-radius:2px;padding:0 6px;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;font-family:var(--sans);font-variation-settings:"wdth" 62;font-weight:700}
.st.committed{color:var(--bg);background:var(--committed)}
.st.provisional{color:var(--bg);background:var(--provisional)}
.st.derived{color:var(--bg);background:var(--derived)}
.st.counted{color:var(--bg);background:var(--counted)}
.st.grown,.st.rewired{color:var(--bg);background:var(--grown)}
.st.defect,.st.poison{color:var(--bg);background:var(--defect)}
.st.unknown{color:var(--ink);background:var(--unknown)}

/* probe ————————————————————————————————————————— */
#transcript{display:flex;flex-direction:column;gap:10px;margin-top:10px;max-height:52vh;overflow-y:auto}
.qa{border-left:2px solid var(--line2);padding-left:10px;animation:in .18s ease-out}
.qa .q{color:var(--dim);font-size:12px}
.qa .q::before{content:"» ";color:var(--faint)}
.acard{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;padding:4px 0 0}
.acard .w{font-size:16px;font-weight:600;cursor:pointer}
.acard .w:hover{text-decoration:underline dotted}
.acard .sent{color:var(--dim);font-size:12px;font-style:italic}
.acard .src{color:var(--faint);font-size:10.5px}
.refusal{color:var(--defect);font-size:12px;padding-top:2px}

/* right column: tabs ———————————————————————————— */
#tabs{display:flex;gap:2px;margin-bottom:-1px;position:relative;z-index:1}
#tabs button{background:var(--panel);border:1px solid var(--line);border-bottom:0;border-radius:4px 4px 0 0;
  padding:7px 16px;cursor:pointer;color:var(--faint);font-family:var(--sans);
  font-variation-settings:"wdth" 62;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase}
#tabs button.on{color:var(--ink);background:var(--panel2);border-color:var(--line2)}
.tabpane{display:none;background:var(--panel2);border:1px solid var(--line2);border-radius:0 4px 4px 4px;
  padding:14px;min-height:480px}
.tabpane.on{display:block}

/* web explorer ————————————————————————————————— */
#web-ctl{display:flex;gap:8px;margin-bottom:8px;align-items:center}
#web-ctl input{max-width:220px}
#web-note{color:var(--faint);font-size:11px}
#websvg{width:100%;height:520px;display:block;background:var(--well);border:1px solid var(--line);border-radius:3px}
#websvg text{font:12px var(--mono);fill:var(--ink)}
#websvg .rel{font-size:9.5px;fill:var(--faint)}
#websvg .nd{cursor:pointer}
#websvg .nd:hover text{fill:var(--committed)}
#websvg .focus text{font-size:15px;font-weight:600;fill:var(--committed)}

/* chains ———————————————————————————————————————— */
.gcard{border:1px solid var(--line);border-radius:3px;background:var(--panel);
  padding:10px 12px;margin-bottom:12px}
.gcard .ghead{display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;margin-bottom:8px}
.gcard .ghead .gt{color:var(--ink);font-size:12.5px}
.gcard .ghead .tp{color:var(--faint);font-size:11px}
.rail{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:10px 2px 6px}
.tick{display:flex;flex-direction:column;align-items:center;min-width:64px;position:relative}
.tick::before{content:"";position:absolute;top:14px;left:0;right:0;height:1px;background:var(--line2)}
.tick:first-child::before{left:50%}.tick:last-child::before{right:50%}
.tick .pin{width:7px;height:7px;border-radius:50%;background:var(--dim);z-index:1;margin-bottom:6px;margin-top:11px}
.tick .co{font-size:9px;color:var(--faint)}
.tick .nn{font-size:12px;padding:1px 4px;max-width:120px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.tick .nn:hover{color:var(--committed)}
.tick .nn.grown{color:var(--grown)}
.tick .more{font-size:10px;color:var(--faint)}
.dfl{color:var(--defect);font-size:12px;padding:2px 0}
.sector-badge{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--sans);
  font-variation-settings:"wdth" 62;font-weight:700;padding:0 6px;border-radius:2px;border:1px solid var(--line2);color:var(--dim)}
.sector-badge.antisymmetric{color:var(--derived);border-color:var(--derived)}
.sector-badge.symmetric{color:var(--committed);border-color:var(--committed)}
.sector-badge.non-homogeneous{color:var(--provisional);border-color:var(--provisional)}

/* numbers ——————————————————————————————————————— */
.nmeta{display:flex;gap:16px;flex-wrap:wrap;color:var(--dim);font-size:12px;margin-bottom:6px}
.numline{display:flex;overflow-x:auto;padding:26px 4px 8px}
.ntick{min-width:74px;display:flex;flex-direction:column;align-items:center;position:relative}
.ntick::before{content:"";position:absolute;top:8px;left:0;right:0;height:2px;background:var(--line2)}
.ntick .pin{width:9px;height:9px;border-radius:50%;background:var(--counted);z-index:1;margin-bottom:8px;margin-top:4px}
.ntick.unnamed .pin{background:var(--unknown)}
.ntick .word{font-size:13px;font-weight:600}
.ntick.unnamed .word{color:var(--faint);font-style:italic;font-weight:400}
.ntick .pos{font-size:9.5px;color:var(--faint)}
.nnote{color:var(--faint);font-size:11.5px}

/* ledger ———————————————————————————————————————— */
table{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0 16px}
th{font-family:var(--sans);font-variation-settings:"wdth" 62;font-weight:700;font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;color:var(--faint);text-align:left;
  border-bottom:1px solid var(--line2);padding:3px 10px 5px 0}
td{border-bottom:1px solid var(--line);padding:4px 10px 4px 0;vertical-align:top}
td.num{font-variant-numeric:tabular-nums}
.tmplcell{color:var(--dim)}
.tmplcell .slot{color:var(--provisional)}
h3.sub{font-variation-settings:"wdth" 62;font-weight:700;font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);margin:14px 0 4px;font-family:var(--sans)}
.pillrow{display:flex;gap:6px;flex-wrap:wrap;font-size:11px}
.pill{border:1px solid var(--line2);border-radius:10px;padding:1px 9px;color:var(--dim)}
.empty{color:var(--faint);font-size:12px;font-style:italic;padding:6px 0}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>relweb <em>·</em> creature console</h1>
    <div class="who">observing <b id="who">…</b> <span id="who2"></span></div>
  </div>
  <div id="vitals"></div>
  <div id="legend">
    <i><span class="dot" style="background:var(--committed)"></span>committed (≥k sources)</i>
    <i><span class="dot" style="background:var(--provisional)"></span>provisional</i>
    <i><span class="dot" style="background:var(--derived)"></span>derived by transport</i>
    <i><span class="dot" style="background:var(--counted)"></span>derived by counting</i>
    <i><span class="dot" style="background:var(--grown)"></span>grown (posited)</i>
    <i><span class="dot" style="background:var(--defect)"></span>defect / poison</i>
  </div>
</header>

<main>
<div class="col">
  <section class="panel" id="teach">
    <div class="ptitle"><h2>Teach</h2><span class="hint">click a construction to reuse it<br>click word = tap · shift-click = slot mark</span></div>
    <div id="tmpl-row"></div>
    <div class="inrow">
      <input type="text" id="feed-in" placeholder="the bear is red   (Enter to read)" autocomplete="off">
      <button class="b go" id="feed-btn" disabled>read</button>
    </div>
    <div id="chips"></div>
    <div class="chiphelp" id="chiphelp"></div>
    <div class="bookrow">provenance <input type="text" id="book-in" value="hand" title="the source this page counts as — facts commit at k distinct sources"> <span id="commitk"></span></div>
    <div id="receipt"></div>
  </section>

  <section class="panel" id="probe">
    <div class="ptitle"><h2>Probe</h2><span class="hint">blank with ? — or a lone word for all beliefs</span></div>
    <div class="inrow">
      <input type="text" id="ask-in" placeholder="the bear is ?" autocomplete="off">
      <button class="b go" id="ask-btn">ask</button>
      <button class="b" id="say-btn" title="volunteer committed facts, read back before speaking">speak</button>
    </div>
    <div id="transcript"></div>
  </section>
</div>

<div class="col">
  <div id="tabs">
    <button data-t="web" class="on">Web</button>
    <button data-t="chains">Chains</button>
    <button data-t="numbers">Numbers</button>
    <button data-t="ledger">Ledger</button>
  </div>
  <div class="tabpane on" id="tab-web">
    <div id="web-ctl">
      <input type="text" id="web-in" placeholder="focus a concept…">
      <button class="b" id="web-go">focus</button>
      <span id="web-note"></span>
    </div>
    <svg id="websvg" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div class="tabpane" id="tab-chains"></div>
  <div class="tabpane" id="tab-numbers"></div>
  <div class="tabpane" id="tab-ledger"></div>
</div>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
const J = (u, body) => fetch(u, body ? {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)} : undefined)
  .then(async r => { if (!r.ok) throw new Error((await r.json()).detail || r.statusText); return r.json(); });
const tmplHTML = t => esc(t).split(" ").map(w => w === "___" ? '<span class="slot">___</span>' : w).join(" ");

let STATUS = null;

/* ————— header vitals ————— */
function vital(k, n, cls){ return `<div class="vital ${cls||""}"><div class="n">${n}</div><div class="k">${k}</div></div>`; }
function renderVitals(s){
  STATUS = s;
  $("who").textContent = s.identity.name;
  $("who2").textContent = (s.identity.created ? "· since " + s.identity.created : "") +
    (s.ledger && s.ledger.passed_stages.length ? ` · ${s.ledger.passed_stages.length} stages mastered` : "");
  const d = s.defects || {count:0}, g = s.growth || {count:0,budget:0};
  $("vitals").innerHTML =
    vital("episodes", s.episodes_seen.toLocaleString()) +
    vital("committed", s.committed_count, "ok") +
    vital("frames", s.model_size.frames) +
    vital("relations", s.relations.length) +
    vital("defects", d.count, d.count ? "alert" : "") +
    vital("grown", `${g.count}<span style="color:var(--faint)">/${g.budget}</span>`) +
    vital("log", (s.log ? s.log.entries : 0).toLocaleString()) +
    vital("coverage", Math.round(s.coverage*100) + "%");
  $("commitk").textContent = "· facts commit at ≥ 2 distinct sources";
  renderTemplates(s);
}
function refreshStatus(){ return J("/api/status").then(renderVitals).catch(()=>{}); }

/* ————— teach ————— */
function renderTemplates(s){
  const frames = (s.frames||[]).slice().sort((a,b)=>a.template.localeCompare(b.template));
  $("tmpl-row").innerHTML = frames.map(f =>
    `<span class="tmpl" data-t="${esc(f.template)}" title="frame ${esc(f.id)}">${tmplHTML(f.template)}</span>`).join("") ||
    '<span class="empty">no constructions induced yet — repetition with substitution grows them</span>';
  document.querySelectorAll(".tmpl").forEach(el => el.onclick = () => {
    $("feed-in").value = el.dataset.t.replaceAll("___", "…");
    $("feed-in").focus(); onFeedInput();
  });
}
let TOKS = [], PIC = null, MARKS = new Set(), tokTimer = null;
function onFeedInput(){
  clearTimeout(tokTimer);
  tokTimer = setTimeout(async () => {
    const text = $("feed-in").value.trim();
    if (!text){ TOKS=[]; renderChips(); return; }
    try { TOKS = (await J("/api/tokenize?text=" + encodeURIComponent(text))).tokens; }
    catch { TOKS = []; }
    PIC = null; MARKS.clear(); renderChips();
  }, 180);
}
function renderChips(){
  $("feed-btn").disabled = TOKS.length === 0;
  $("chips").innerHTML = TOKS.map((t,i) =>
    `<span class="chip ${PIC===i?"pic":""} ${MARKS.has(i)?"mark":""}" data-i="${i}">${esc(t)}</span>`).join("");
  $("chiphelp").textContent = TOKS.length
    ? (PIC!=null ? `tap: “${TOKS[PIC]}” is the pictured referent (orients the fact)` : "no tap — the fact keeps token order")
    : "";
  document.querySelectorAll("#chips .chip").forEach(el => el.onclick = (ev) => {
    const i = +el.dataset.i;
    if (ev.shiftKey){ MARKS.has(i) ? MARKS.delete(i) : MARKS.add(i); }
    else { PIC = (PIC === i) ? null : i; }
    renderChips();
  });
}
function receipt(html, warn){
  const el = document.createElement("div");
  el.className = "rc" + (warn ? " warn" : "");
  el.innerHTML = `<span class="t">${new Date().toLocaleTimeString()}</span><span>${html}</span>`;
  $("receipt").prepend(el);
  while ($("receipt").children.length > 12) $("receipt").lastChild.remove();
}
async function feed(){
  const text = $("feed-in").value.trim();
  if (!text || TOKS.length === 0) return;
  const body = { text, book: $("book-in").value.trim() || "hand" };
  if (PIC != null) body.picture = TOKS[PIC];
  if (MARKS.size) body.marks = [...MARKS].sort((a,b)=>a-b).map(i => [i, i+1]);
  const nTok = TOKS.length;
  try {
    const r = await J("/api/feed", body);
    const o = r.observation;
    if (o.parsed){
      const fr = (r.status.frames.find(f => f.id === o.frame) || {template: o.frame}).template;
      receipt(`parsed in <span class="tmplcell">${tmplHTML(fr)}</span>
        → <b>${esc(o.fact[0])}</b> → <b>${esc(o.fact[1])}</b> <span class="st ${o.status}">${o.status}</span>`);
    } else {
      receipt(`unparsed → frontier (length ${nTok}); repeats with substitution will induce a frame`);
    }
    renderVitals(r.status);
    $("feed-in").value = ""; TOKS=[]; PIC=null; MARKS.clear(); renderChips();
    if (activeTab === "web") loadWeb(lastFocus);
  } catch (e) { receipt(esc(e.message), true); }
}
$("feed-in").addEventListener("input", onFeedInput);
$("feed-in").addEventListener("keydown", e => { if (e.key === "Enter") feed(); });
$("feed-btn").onclick = feed;

/* ————— probe ————— */
function statusChip(a){
  let cls = a.status;
  if (a.via === "counting") cls = "counted";
  return `<span class="st ${cls}">${cls}</span>`;
}
function answerCards(r){
  if (r.kind === "about"){
    if (!r.beliefs.length) return `<div class="refusal">nothing believed about “${esc(r.referent)}” yet</div>`;
    return r.beliefs.map(b => `<div class="acard">
        <span class="w" data-c="${esc(b.target)}">${esc(b.target)}</span>
        <span class="st ${b.status}">${b.status}</span>
        ${b.sentence ? `<span class="sent">“${esc(b.sentence)}”</span>` : ""}
        <span class="src">${b.sources.length} source${b.sources.length===1?"":"s"}: ${esc(b.sources.slice(0,4).join(", "))}${b.sources.length>4?"…":""}</span>
      </div>`).join("");
  }
  if (r.kind !== "answer") return `<div class="refusal">${esc(r.reason || "refused")}</div>`;
  if (!r.answers.length)
    return `<div class="refusal">${r.refused ? esc(r.refused) + " (degraded to refusal)" : "unknown — not taught, not derivable, no witness to grow"}</div>`;
  return r.answers.map(a => `<div class="acard">
      <span class="w" data-c="${esc(a.answer)}">${esc(a.answer)}</span>
      ${statusChip(a)}
      ${a.sentence ? `<span class="sent">“${esc(a.sentence)}”</span>` : ""}
      ${a.via === "motif" && a.through ? `<span class="src">inherited through ${a.through.map(esc).join(" → ")}</span>` : ""}
    </div>`).join("");
}
function pushQA(q, html){
  const el = document.createElement("div");
  el.className = "qa";
  el.innerHTML = `<div class="q">${esc(q)}</div>${html}`;
  $("transcript").prepend(el);
  while ($("transcript").children.length > 24) $("transcript").lastChild.remove();
  el.querySelectorAll(".w").forEach(w => w.onclick = () => { setTab("web"); loadWeb(w.dataset.c); });
}
async function ask(){
  const q = $("ask-in").value.trim();
  if (!q) return;
  try { pushQA(q, answerCards(await J("/api/ask", {text:q}))); }
  catch(e){ pushQA(q, `<div class="refusal">${esc(e.message)}</div>`); }
  $("ask-in").value = "";
  refreshStatus();       // a probe can GROW (posit a concept) — keep vitals honest
}
async function say(){
  try {
    const r = await J("/api/say", {referent:null});
    pushQA("(speak: committed facts, read back before voicing)",
      r.sentences.length
        ? r.sentences.map(s => `<div class="acard"><span class="sent">“${esc(s.sentence)}”</span></div>`).join("")
        : `<div class="refusal">nothing committed to say yet</div>`);
  } catch(e){ pushQA("(speak)", `<div class="refusal">${esc(e.message)}</div>`); }
}
$("ask-in").addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
$("ask-btn").onclick = ask;
$("say-btn").onclick = say;

/* ————— tabs ————— */
let activeTab = "web";
function setTab(t){
  activeTab = t;
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("on", b.dataset.t === t));
  document.querySelectorAll(".tabpane").forEach(p => p.classList.toggle("on", p.id === "tab-" + t));
  if (t === "web") loadWeb(lastFocus);
  if (t === "chains") loadChains();
  if (t === "numbers") renderNumbers();
  if (t === "ledger") renderLedger();
}
document.querySelectorAll("#tabs button").forEach(b => b.onclick = () => setTab(b.dataset.t));

/* ————— web explorer (ego graph) ————— */
let lastFocus = null;
async function loadWeb(focus){
  let g;
  try { g = await J("/api/web?limit=26" + (focus ? "&focus=" + encodeURIComponent(focus) : "")); }
  catch { return; }
  lastFocus = g.focus;
  $("web-in").value = g.focus || "";
  $("web-note").textContent = g.focus
    ? `${g.edges.length} edges around “${g.focus}”` + (g.truncated ? " (truncated)" : "")
    : "nothing committed yet — teach something first";
  drawWeb(g);
}
function drawWeb(g){
  const svg = $("websvg"); svg.innerHTML = "";
  if (!g.focus) return;
  const W = 1000, H = 520, cx = W/2, cy = H/2;
  // ONE node per neighbour concept. A neighbour that is both a source and a
  // target of the focus (a converse pair — "four is before five" / "five comes
  // after four") is a SINGLE node carrying both relations, never two glyphs.
  const byOther = new Map();
  for (const e of g.edges){
    const other = e.source === g.focus ? e.target : e.source;
    if (other === g.focus) continue;
    if (!byOther.has(other)) byOther.set(other, {other, rels:new Set(), out:false, in:false, committed:false});
    const o = byOther.get(other);
    o.rels.add(e.rel);
    if (e.source === g.focus) o.out = true; else o.in = true;
    o.committed = o.committed || e.committed;
  }
  const nbrs = [...byOther.values()].sort((a,b) => a.other.localeCompare(b.other));
  const N = nbrs.length;
  const NS = "http://www.w3.org/2000/svg";
  const mk = (t, at) => { const el = document.createElementNS(NS, t); for (const k in at) el.setAttribute(k, at[k]); return el; };
  const P = nbrs.map((o, i) => {
    const a = (i / Math.max(1, N)) * 2 * Math.PI - Math.PI/2;   // full ring, even spacing
    const r = 168 + (i % 2) * 46;
    return { o, x: cx + Math.cos(a) * r * 2.0, y: cy + Math.sin(a) * r, a };
  });
  for (const p of P){
    const grown = /^new-/.test(p.o.other);
    const col = grown ? "var(--grown)" : p.o.committed ? "var(--committed)" : "var(--provisional)";
    // an arrowless line, but marked with direction: → out, ← in, ↔ both (converse)
    svg.appendChild(mk("line", {x1:cx, y1:cy, x2:p.x, y2:p.y, stroke:col,
      "stroke-width": p.o.committed ? 1.6 : 1, "stroke-dasharray": (p.o.committed && !grown) ? "" : "4 4", opacity:.5}));
    const dir = p.o.out && p.o.in ? "↔" : p.o.out ? "→" : "←";
    const rel = [...p.o.rels].join(", ");
    const tl = mk("text", {x:(cx+p.x)/2, y:(cy+p.y)/2 - 4, "text-anchor":"middle", class:"rel"});
    tl.textContent = `${dir} ${rel}`; svg.appendChild(tl);
  }
  for (const p of P){
    const grown = /^new-/.test(p.o.other);
    const nd = mk("g", {class:"nd"});
    const anchor = p.x < cx - 30 ? "end" : p.x > cx + 30 ? "start" : "middle";
    const t = mk("text", {x:p.x, y:p.y, "text-anchor":anchor});
    t.textContent = p.o.other;
    if (grown) t.setAttribute("fill", "var(--grown)");
    else if (!p.o.committed) t.setAttribute("fill", "var(--dim)");
    nd.appendChild(t);
    nd.onclick = () => loadWeb(p.o.other);
    svg.appendChild(nd);
  }
  const f = mk("g", {class:"focus"});
  const ft = mk("text", {x:cx, y:cy, "text-anchor":"middle"});
  ft.textContent = g.focus; f.appendChild(ft); svg.appendChild(f);
}
$("web-go").onclick = () => loadWeb($("web-in").value.trim() || null);
$("web-in").addEventListener("keydown", e => { if (e.key === "Enter") $("web-go").onclick(); });

/* ————— chains (the gauge groups) ————— */
async function loadChains(){
  let d;
  try { d = await J("/api/chains"); } catch { return; }
  const pane = $("tab-chains");
  if (!d.groups.length){
    pane.innerHTML = '<div class="empty">no composable relation classes yet — teach converse pairs (“five comes after four” / “four is before five”)</div>';
    return;
  }
  pane.innerHTML = d.groups.map(g => {
    const head = g.classes.map(c =>
      `<span class="gt">${c.templates.map(tmplHTML).join(" · ")}</span>
       <span class="sector-badge ${esc(c.sector)}">${esc(c.sector)}</span>
       <span class="tp">g=${c.transport === null ? "—" : (c.transport>0?"+":"")+c.transport} · ${c.edges} edges</span>`).join(" &nbsp; ");
    const rails = g.components.map(comp => {
      const byCoord = new Map();
      for (const n of comp){
        if (!byCoord.has(n.coord)) byCoord.set(n.coord, []);
        byCoord.get(n.coord).push(n.id);
      }
      const coords = [...byCoord.keys()].sort((a,b)=>a-b).slice(0, 40);
      return `<div class="rail">` + coords.map(c => {
        const nodes = byCoord.get(c);
        return `<div class="tick"><div class="pin"></div>
          ${nodes.slice(0,4).map(n => `<span class="nn ${/^new-/.test(n)?"grown":""}" data-c="${esc(n)}">${esc(n)}</span>`).join("")}
          ${nodes.length>4 ? `<span class="more">+${nodes.length-4}</span>` : ""}
          <span class="co">φ=${c}</span></div>`;
      }).join("") + `</div>`;
    }).join("");
    const defs = g.defects.map(x =>
      `<div class="dfl">⚠ ${esc(x.u)} —(${esc(x.class)})→ ${esc(x.v)} · holonomy residual ${x.residual>0?"+":""}${x.residual} <span class="st defect">defect</span></div>`).join("");
    const extra = g.n_components > g.components.length
      ? `<div class="nnote">…and ${g.n_components - g.components.length} more components</div>` : "";
    return `<div class="gcard"><div class="ghead">${head}</div>${rails}${defs}${extra}</div>`;
  }).join("");
  pane.querySelectorAll(".nn").forEach(el => el.onclick = () => { setTab("web"); loadWeb(el.dataset.c); });
}

/* ————— numbers (the constructed chain + the map) ————— */
function renderNumbers(){
  const pane = $("tab-numbers"), n = STATUS && STATUS.numbers;
  if (!n || !n.classes){
    pane.innerHTML = '<div class="empty">no counting experience yet — the constructed chain grows from bare pairing play (no numeral is ever input)</div>';
    return;
  }
  let html = `<div class="nmeta">
    <span>${n.classes} constructed classes (from wordless play)</span>
    ${n.map ? `<span>interface map: orientation ${n.map.orientation>0?"+1":"−1"}, offset ${n.map.offset}</span>
               <span>${n.map.poison ? `<span class="st poison">${n.map.poison} poison naming${n.map.poison>1?"s":""}</span>` : "no poison"}</span>`
            : `<span class="st unknown">no committed word↔class map yet (needs ≥ k consistent named words)</span>`}
  </div>`;
  const named = n.map ? n.map.named : {};
  const byPos = {}; Object.entries(named).forEach(([w,p]) => byPos[p] = w);
  html += `<div class="numline">`;
  for (let p = 1; p <= n.classes; p++){
    const w = byPos[p];
    html += `<div class="ntick ${w?"":"unnamed"}"><div class="pin"></div>
      <span class="word">${w ? esc(w) : "(unnamed)"}</span><span class="pos">class ${p}</span></div>`;
  }
  html += `</div>
  <div class="nnote">each tick is a CLASS of piles that saturate against one another (a derived MATCH quotient);
  succession came from ONEMORE leftovers. A named tick is a committed word↔class identification —
  a word can sit here without ever appearing in an order sentence.</div>`;
  if (n.contradictions.length)
    html += n.contradictions.map(c => `<div class="dfl">⚠ ${esc(c[0])} — ${esc(c[1])}</div>`).join("");
  pane.innerHTML = html;
}

/* ————— ledger ————— */
function renderLedger(){
  const s = STATUS; if (!s) return;
  const pane = $("tab-ledger");
  const sect = (s.sectors||[]).map(r => `<tr>
      <td class="tmplcell">${r.templates.map(tmplHTML).join("<br>")}</td>
      <td><span class="sector-badge ${esc(r.sector)}">${esc(r.sector)}</span></td>
      <td class="num">${r.transport === null ? "—" : (r.transport>0?"+":"")+r.transport}</td>
      <td class="num">${r.edges}</td><td class="num">${r.support}</td></tr>`).join("");
  const growth = (s.growth.events||[]).map(e => `<tr>
      <td><span class="st ${e.move==="grow"?"grown":"rewired"}">${e.move}</span></td>
      <td>${esc(e.given)} → <b>${esc(e.answer)}</b></td>
      <td class="tmplcell">${esc((e.anchors||[]).join(" "))}</td>
      <td class="num">${e.rounds} rounds</td></tr>`).join("");
  const motifs = (s.motifs||[]).map(m => `<tr>
      <td class="tmplcell">${(m.rel_templates.length?m.rel_templates:[m.rel]).map(tmplHTML).join("<br>")}</td>
      <td class="tmplcell">${(m.via_templates.length?m.via_templates:[m.via]).map(tmplHTML).join("<br>")}</td>
      <td><span class="st ${m.committed ? "derived" : "provisional"}">${m.committed ? "committed" : "refused"}</span></td>
      <td class="num">${m.witnesses}</td><td class="num">${m.violations}</td><td class="num">${m.support}</td></tr>`).join("");
  const refused = (s.relations_refused||[]).map(r => `<tr>
      <td>${esc(r.a)} + ${esc(r.b)}</td><td class="warn">${esc(r.reason)}</td></tr>`).join("");
  const frontier = Object.entries(s.frontier||{}).sort((a,b)=>b[1].count-a[1].count).slice(0,8)
    .map(([len,f]) => `<tr><td class="num">${len} tokens</td><td class="num">${f.count}</td>
      <td class="tmplcell">${esc(f.exemplars[0]||"")}</td></tr>`).join("");
  pane.innerHTML = `
    <h3 class="sub">Relation classes — inferred transports</h3>
    ${sect ? `<table><tr><th>constructions (unified)</th><th>sector</th><th>g</th><th>edges</th><th>support</th></tr>${sect}</table>`
           : '<div class="empty">no relations yet</div>'}
    <h3 class="sub">Motifs — inheritance rules scored on committed testimony (rel ⊇ via ∘ rel)</h3>
    ${motifs ? `<table><tr><th>inherited relation</th><th>through</th><th>verdict</th><th>witnesses</th><th>violations</th><th>support</th></tr>${motifs}</table>`
             : '<div class="empty">no composite paths scored yet</div>'}
    <h3 class="sub">Growth — concepts the creature posited (${s.growth.count}/${s.growth.budget} budget)</h3>
    ${growth ? `<table><tr><th>move</th><th>obstruction</th><th>relation</th><th>persistence</th></tr>${growth}</table>`
             : '<div class="empty">no growth events — every question so far was answerable in-web</div>'}
    <h3 class="sub">Refused merges — rehearsal-refusals with reasons</h3>
    ${refused ? `<table><tr><th>candidate</th><th>reason</th></tr>${refused}</table>`
              : '<div class="empty">none refused</div>'}
    <h3 class="sub">Frontier — what it cannot parse yet (the induction queue)</h3>
    ${frontier ? `<table><tr><th>shape</th><th>count</th><th>exemplar</th></tr>${frontier}</table>`
               : '<div class="empty">frontier empty</div>'}
    <h3 class="sub">Provenance</h3>
    <div class="pillrow">
      <span class="pill">episode log: ${s.log.entries.toLocaleString()} entries, ${s.log.excluded} excluded</span>
      <span class="pill">trace bus: ${s.bus.total.toLocaleString()} acts (${s.bus.cf} counterfactual)</span>
      ${(s.ledger ? s.ledger.read_sources : []).map(r => `<span class="pill">read: ${esc(r)}</span>`).join("")}
    </div>`;
}

/* ————— boot ————— */
refreshStatus().then(() => loadWeb(null));
setInterval(refreshStatus, 60000);
